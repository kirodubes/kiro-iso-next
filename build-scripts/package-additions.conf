# EXTRA APPS to ADD to the ISO (kiro-iso-builder "Add apps" page).
#
# build-the-iso.sh's apply_package_additions() UNcomments the matching EXTRA-APP
# block in the build-tree copy of packages.x86_64. One app KEY per line (the key
# from the "### >>> EXTRA-APP <key> | ... >>>" marker, e.g. wps, ollama); lines
# starting with # are ignored. An empty list adds nothing — the standard ISO.
#
# Only opt-in EXTRA APPS belong here (apps Kiro leaves off the base image). The
# build warns and skips a key that has no block, so a stale entry can't break it.
