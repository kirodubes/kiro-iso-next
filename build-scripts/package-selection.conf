# TIER 3 packages to EXCLUDE from the ISO (kiro-iso-builder package profile).
#
# build-the-iso.sh's apply_package_selection() comments each one out in the
# build-tree copy of packages.x86_64. One package name per line; lines starting
# with # are ignored. An empty list ships the full TIER 3 set. This same format
# is build-scripts/package-selection.conf and an importable saved profile.
#
# Only TIER 3 (USER-CHANGEABLE / OPTIONAL) packages belong here — TIER 1
# (frozen) and TIER 2 (core) must never be excluded.
