[main]
# Load-bearing default. tuned-ppd's Controller.initialize() picks its base
# profile via a short-circuit chain:
#   1. read /etc/tuned/ppd_base_profile   (NOT seeded — file intentionally absent)
#   2. ask tuned.recommend_profile() over DBus
#   3. fall back to this `default=` value  ← we rely on this
# We no longer pre-seed ppd_base_profile, so step 1 returns None and selection
# falls through to `default=performance` here, which maps via [profiles] below
# to TuneD's `throughput-performance` — matching the seeded active_profile.
# Caveat: if step 2 returns `balanced` first (tuned's generic bare-metal
# recommendation) it can win before step 3; verified in practice that the
# seeded active_profile + profile_mode=manual holds. Keep `default=performance`.
default=performance
battery_detection=true
sysfs_acpi_monitor=true

[profiles]
# PPD = TuneD
power-saver=powersave
balanced=balanced
performance=throughput-performance

[battery]
# PPD = TuneD
balanced=balanced-battery
