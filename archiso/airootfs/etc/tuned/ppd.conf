[main]
# Belt-and-braces fallback only. The real load-bearing override is the
# sibling file `ppd_base_profile`, pre-seeded with `performance` in the
# airootfs. tuned-ppd's Controller.initialize() picks its base profile
# via a short-circuit chain:
#   1. read /etc/tuned/ppd_base_profile  ← we win here
#   2. ask tuned.recommend_profile() over DBus  (would otherwise return
#      `balanced` on first boot and clobber active_profile)
#   3. fall back to this `default=` value
# Step 1 wins in practice, so `default=` only matters if ppd_base_profile
# gets wiped. Keep it = performance to match the seeded base profile.
default=performance
battery_detection=true
sysfs_acpi_monitor=true

[profiles]
# PPD = TuneD
power-saver=powersave
balanced=balanced
performance=throughput-performance

[battery]
# PPD = TuneD
balanced=balanced-battery
