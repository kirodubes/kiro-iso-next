LABEL arch_fallback_zen
TEXT HELP
Boot the kiro install medium on BIOS with the fallback kernel (linux-zen).
Use this if linux-cachyos fails to boot on your hardware.
ENDTEXT
MENU LABEL Boot kiro (%ARCH%, BIOS, fallback kernel linux-zen)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% cow_spacesize=4G copytoram=n archisosearchuuid=%ARCHISO_UUID% driver=free module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes quiet splash
