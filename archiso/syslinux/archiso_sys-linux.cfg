LABEL arch
TEXT HELP
Open-source GPU stack (AMD / Intel / nouveau).
On NVIDIA hardware the bundled proprietary driver is removed during install.
If you have an NVIDIA card, pick a 'NVIDIA proprietary' entry instead.
ENDTEXT
MENU LABEL Boot kiro (%ARCH%, BIOS, open drivers: AMD / Intel - NVIDIA driver removed)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% cow_spacesize=4G copytoram=n archisosearchuuid=%ARCHISO_UUID% driver=free module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes quiet splash

LABEL arch nonfree
TEXT HELP
Keeps the bundled nvidia-open-dkms driver - the express path for modern
NVIDIA GPUs (Turing and newer: RTX and GTX 16xx). No internet needed.
ENDTEXT
MENU LABEL Boot kiro (%ARCH%, BIOS, NVIDIA proprietary, modern - keeps nvidia-open)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% cow_spacesize=4G copytoram=n archisosearchuuid=%ARCHISO_UUID% driver=nonfree nvidia nvidia-drm.modeset=1 nouveau.modeset=0 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr nvme_load=yes quiet splash

LABEL arch nonfreechwd
TEXT HELP
Detects your GPU and installs the matching NVIDIA driver online,
including older cards (470xx / 390xx). Requires internet during install.
ENDTEXT
MENU LABEL Boot kiro (%ARCH%, BIOS, NVIDIA proprietary, auto-detect - needs internet)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% cow_spacesize=4G copytoram=n archisosearchuuid=%ARCHISO_UUID% driver=nonfreechwd nvidia nvidia-drm.modeset=1 nouveau.modeset=0 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr nvme_load=yes quiet splash

LABEL arch nomodeset
TEXT HELP
Boot the kiro install medium on BIOS with nomodeset.
It allows you to install kiro or perform system maintenance.
ENDTEXT
MENU LABEL Boot kiro (%ARCH%, BIOS, nomodeset)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
APPEND archisobasedir=%INSTALL_DIR% cow_spacesize=4G copytoram=n archisosearchuuid=%ARCHISO_UUID% driver=free nomodeset module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr nouveau.modeset=0 radeon.modeset=0 i915.modeset=0 nvme_load=yes

