title    kiro install medium (%ARCH%, UEFI, open source: AMD / Intel)
sort-key 01
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% driver=free cow_spacesize=10G copytoram=n module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm,pcspkr nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes quiet splash loglevel=3 no_timer_check
